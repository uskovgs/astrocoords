url: https://uskovgs.github.io/astrocoords/
template:
  bootstrap: 5
  light-switch: true

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github, lightswitch]
  components:
    intro:
      text: Get started
      href: articles/astrocoords.html
    articles:
      text: Articles
      menu:
        - text: Coord matching
          href: articles/coord_matching.html
        - text: Working with time
          href: articles/working_with_time.html
    github:
      icon: fab fa-github
      aria-label: GitHub repository
      href: https://github.com/uskovgs/astrocoords

reference:
  - title: Coordinates
    desc: Create and inspect sky coordinate vectors.
    contents:
      - sky_coord
      - is.sky_coord
      - ra_dec
      - gal_coord
      - ra
      - dec
      - l
      - b
      - frame
      - separation

  - title: Matching
    desc: Low-level catalog matching helpers.
    contents:
      - coord_match
      - coord_nearest
      - coord_left_join
      - coord_nearest_join
      - coord_right_join
      - coord_full_join
      - coord_inner_join

  - title: Frames and Transforms
    desc: Define coordinate frames and transform between them.
    contents:
      - to_cartesian
      - icrs
      - galactic
      - transform_to

  - title: Parsing and Naming
    desc: Parse source coordinates and build IAU-style names.
    contents:
      - parse_coord
      - iau_name
      - deg_to_hms
      - deg_to_dms

  - title: Time
    desc: Convert between calendar dates and JD/MJD.
    contents:
      - datetime_to_jd
      - jd_to_datetime
      - mjd_to_datetime
      - leap_second_dates

  - title: Printing Options
    desc: Control how sky coordinates are printed.
    contents:
      - set_print_hms
      - set_print_plain
      - set_print_colon
      - set_print_pair

  - title: Deprecated
    desc: Backward-compatible aliases.
    contents:
      - radec
